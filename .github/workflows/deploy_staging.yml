# .github/workflows/deploy_staging.yml
name: Deploy Staging

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy:
    # Use your self-hosted runner on the EC2 (no SSH needed)
    runs-on: [self-hosted]
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy on server (local)
        shell: bash
        run: |
          set -euo pipefail

          DEPLOY_DIR=/opt/alignment-atlas/staging

          sudo mkdir -p "$DEPLOY_DIR"
          sudo chown -R ubuntu:ubuntu /opt/alignment-atlas

          # Copy repo contents into the staging deploy dir
          rsync -az --delete \
            --exclude ".git" \
            --exclude ".venv" \
            --exclude "__pycache__" \
            --exclude ".pytest_cache" \
            ./ "$DEPLOY_DIR/"

          cd "$DEPLOY_DIR"

          # Python deps
          if [ ! -d ".venv" ]; then python3 -m venv .venv; fi
          . .venv/bin/activate

          python -m pip install -U pip wheel
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

          # Restart service
          sudo systemctl restart alignment-atlas-staging

          # Smoke test
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8502 >/dev/null; then
              echo "Alignment Atlas staging OK"
              exit 0
            fi
            sleep 1
          done

          echo "Staging smoke test failed"
          sudo systemctl status alignment-atlas-staging --no-pager || true
          sudo journalctl -u alignment-atlas-staging -n 120 --no-pager || true
          exit 1