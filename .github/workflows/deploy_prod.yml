# .github/workflows/deploy_prod.yml
name: Deploy Production

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

concurrency:
  group: deploy-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Trust host key (debug)
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh

          # 1) Secret present?
          if [ -z "${{ secrets.SSH_HOST }}" ]; then
            echo "SSH_HOST is empty (secret not loaded). Check Settings -> Environments -> prod -> Secrets."
            exit 1
          fi
          echo "SSH_HOST present."

          # 2) DNS resolves?
          echo "DNS lookup..."
          getent hosts "${{ secrets.SSH_HOST }}" || (echo "DNS resolution failed for SSH_HOST" && exit 1)

          # 3) Port 22 reachable?
          echo "Port 22 check..."
          timeout 5 bash -lc 'cat < /dev/null > /dev/tcp/${{ secrets.SSH_HOST }}/22' \
            || (echo "Port 22 is not reachable from GitHub runner" && exit 1)

          # 4) Record host key
          ssh-keyscan -T 10 -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync to server
        run: |
          rsync -az --delete \
            --exclude ".git" \
            --exclude ".venv" \
            --exclude "__pycache__" \
            --exclude ".pytest_cache" \
            ./ ubuntu@${{ secrets.SSH_HOST }}:/opt/alignment-atlas/prod/

      - name: Install deps + restart + smoke test
        run: |
          ssh ubuntu@${{ secrets.SSH_HOST }} << 'EOF'
            set -euo pipefail
            cd /opt/alignment-atlas/prod

            if [ ! -d ".venv" ]; then python3 -m venv .venv; fi
            . .venv/bin/activate

            python -m pip install -U pip wheel
            if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

            sudo systemctl restart alignment-atlas-prod
            for i in {1..20}; do
              if curl -fsS http://127.0.0.1:8501 >/dev/null; then
                echo "Alignment Atlas production OK"
                exit 0
              fi
              sleep 1
            done

            echo "Production smoke test failed"
            sudo systemctl status alignment-atlas-prod --no-pager || true
            exit 1
          EOF