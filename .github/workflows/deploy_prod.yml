name: Deploy Production
shell: bash
run: |
  set -euo pipefail

  DEPLOY_DIR=/opt/alignment-atlas/prod

  sudo mkdir -p "$DEPLOY_DIR"
  sudo chown -R ubuntu:ubuntu /opt/alignment-atlas

  # Sync repo contents into deploy dir (local copy, no rsync over ssh)
  rsync -az --delete \
    --exclude ".git" \
    --exclude "__pycache__" \
    --exclude ".pytest_cache" \
    ./ "$DEPLOY_DIR/"

  cd "$DEPLOY_DIR"

  # Ensure uv exists on the self-hosted runner
  if ! command -v uv >/dev/null 2>&1; then
    curl -LsSf https://astral.sh/uv/install.sh | sh
    export PATH="$HOME/.local/bin:$PATH"
  fi

  # Install deps using uv (prefer lockfile for reproducibility)
  if [ -f uv.lock ]; then
    uv sync --frozen
  else
    uv sync
  fi

  # Restart service
  sudo systemctl restart alignment-atlas-prod

  # Smoke test
  for i in {1..30}; do
    if curl -fsS http://127.0.0.1:8501 >/dev/null; then
      echo "Alignment Atlas production OK"
      exit 0
    fi
    sleep 1
  done

  echo "Production smoke test failed"
  sudo systemctl status alignment-atlas-prod --no-pager || true
  sudo journalctl -u alignment-atlas-prod -n 120 --no-pager || true
  exit 1